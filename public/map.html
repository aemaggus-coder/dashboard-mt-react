<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Карта РФ — Центр мониторинга социальной поддержки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<style>
:root{
  --bg:#dfe8f0;--surface:#fff;--surface-2:#f0f5fb;
  --border:#c5d0e0;--border-s:#adbdd1;
  --text:#0a0f1f;--text-2:#1e3a5f;--text-3:#475569;
  --blue:#1a4fbf;--blue-l:#2563eb;--green:#0d9a5f;--red:#ef4444;
  --mono:'Roboto Mono',monospace;
}
html[data-theme="dark"]{
  --bg:#313847;--surface:#3d4555;--surface-2:#474f62;
  --border:rgba(255,255,255,.12);--border-s:rgba(255,255,255,.16);
  --text:#ffffff;--text-2:#dde5f0;--text-3:#a8b5cc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-4px)}100%{transform:translateY(0px)}}
@keyframes glow{0%{text-shadow:0 0 10px rgba(96,165,250,.5)}50%{text-shadow:0 0 20px rgba(96,165,250,.8)}100%{text-shadow:0 0 10px rgba(96,165,250,.5)}}
body{animation:fadeIn .3s ease-in;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;font-size:14px;min-width:1280px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:18px;padding:0 28px;height:60px;
  background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 40%,#2563eb 72%,#3b82f6 100%);
  border-bottom:1px solid rgba(255,255,255,.14);
  box-shadow:0 4px 20px rgba(20,50,180,.35), inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink:0;position:relative;z-index:1;backdrop-filter:blur(10px)}
.topbar-title{flex:1;text-align:center;font-size:16px;font-weight:800;color:#fff}
.btn-home{display:flex;align-items:center;gap:6px;text-decoration:none;
  font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);
  color:#fff;transition:all .22s cubic-bezier(.4,0,.2,1);flex-shrink:0;position:relative}
.btn-home:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);
  transform:translateX(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.2);filter:brightness(1.1)}
.theme-sw{width:44px;height:25px;border-radius:999px;background:rgba(255,255,255,.2);
  border:1.5px solid rgba(255,255,255,.3);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;margin-left:auto}
.theme-sw.on{background:rgba(255,255,255,.35)}
.theme-knob{position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  font-size:11px;display:flex;align-items:center;justify-content:center}
.theme-sw.on .theme-knob{transform:translateX(19px)}
.content{flex:1;overflow:auto;display:flex;flex-direction:column;min-height:0}
.map-header{padding:16px 28px;text-align:center;flex-shrink:0;background:var(--bg)}
.map-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;animation:float 3s ease-in-out infinite}
.map-title span{color:var(--text-2)}
.map-sub{font-size:12px;color:#fff!important;display:flex;align-items:center;justify-content:center;gap:6px}
.map-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.map-switcher{display:flex;gap:10px;padding:14px 28px;flex-shrink:0;background:var(--bg);justify-content:center}
.map-switcher.compact{padding:0 28px 12px;gap:8px;justify-content:flex-start}
.map-switcher-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:7px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative}
.map-switcher-btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff}
.map-switcher-btn.active{background:rgba(59,130,246,.25);border-color:#60a5fa;color:#60a5fa;
  box-shadow:0 0 20px rgba(96,165,250,.4), inset 0 1px 0 rgba(255,255,255,.1);backdrop-filter:blur(8px)}

.map-view{display:none;flex:1;min-height:450px;gap:12px;overflow:hidden;width:100%;height:100%;flex-direction:row}
.map-view.active{display:flex!important}

.mbar{width:256px;flex-shrink:0;display:flex;flex-direction:column;height:100%;
  background:var(--surface);border-right:1px solid var(--border);overflow:hidden;backdrop-filter:blur(8px)}
.mbar-mode{padding:12px 12px 10px;border-bottom:1px solid var(--border);background:var(--bg)}
.mbar-mode-label{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.mbar-mode-actions{display:flex;gap:7px}
.mbar-mode-actions .map-switcher-btn{flex:1;padding:7px 8px;font-size:12px}
.mbar-head{padding:13px 13px 12px;flex-shrink:0;border-bottom:1px solid var(--border);min-height:48px;display:flex;align-items:center;background:var(--bg)}
.mbar-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-3)}
.mbar-tree{flex:1;overflow-y:auto;padding:6px 0 12px}
.mbar-tree::-webkit-scrollbar{width:3px}
.mbar-tree::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}
.mbar-panel{display:none;flex:1;overflow-y:auto;padding:10px 10px 14px}
.mbar-panel.active{display:block}
.metric-group{padding:8px 0 10px;border-bottom:1px solid var(--border)}
.metric-group:last-child{border-bottom:none}
.metric-group-title{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;margin:0 2px 7px}
.metric-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;
  border:1px solid transparent;background:transparent;color:var(--text-2);border-radius:8px;
  padding:8px 9px;cursor:pointer;transition:all .15s}
.metric-btn:hover{background:var(--surface-2);color:var(--text)}
.metric-btn.active{background:rgba(37,99,235,.16);border-color:rgba(96,165,250,.45);color:var(--blue-l)}
.metric-name{font-size:12px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.metric-unit{font-size:10px;font-family:var(--mono);font-weight:800;color:var(--text-3);flex-shrink:0}
.mfo-hdr{display:flex;align-items:center;padding:6px 12px 6px 8px;cursor:pointer;transition:background .12s;user-select:none}
.mfo-hdr:hover{background:var(--surface-2)}
.mfo-hdr.mfo-active{background:rgba(37,99,235,.12)}
.mfo-chev{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-3);transition:transform .2s}
.mfo-node.open>.mfo-hdr .mfo-chev{transform:rotate(90deg)}
.mfo-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-right:7px}
.mfo-name{flex:1;font-size:12px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mfo-cnt{font-size:10px;color:var(--text-3);flex-shrink:0;margin-left:4px}
.mfo-tot{font-size:10px;font-family:var(--mono);color:var(--text-2);flex-shrink:0;margin-left:5px;font-weight:600}
.mfo-regs{display:none;padding:2px 0 4px 28px}
.mfo-node.open>.mfo-regs{display:block}
.mreg-row{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 0;cursor:pointer;border-radius:6px;margin:1px 4px;transition:background .1s;position:relative}
.mreg-row:hover{background:var(--surface-2)}
.mreg-row.mreg-active{background:rgba(37,99,235,.14)}
.mreg-row.mreg-active::before{content:'';position:absolute;left:-6px;top:20%;bottom:20%;width:2px;border-radius:2px;background:var(--blue-l)}
.mreg-heat{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.mreg-lbl{flex:1;font-size:12px;color:var(--text-2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mreg-num{font-size:11px;font-family:var(--mono);color:var(--text-3);flex-shrink:0}
.mbar-foot{flex-shrink:0;padding:9px 13px;border-top:1px solid var(--border)}
.mleg-row{display:flex;align-items:center;gap:10px}
.mleg-lbl{font-size:10px;color:var(--text-3);font-weight:600}
.mleg-bar{flex:1;height:8px;border-radius:999px;background:linear-gradient(to right,#22a34a 0%,#84cc16 25%,#ca8a04 50%,#ea580c 75%,#dc2626 100%)}

.mbar-content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg)}
.mbar-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.mbar-reset{font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;border:1px solid rgba(239,68,68,.3);
  background:rgba(239,68,68,.12);color:#fca5a5;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;margin-left:auto;position:relative}
.mbar-reset:hover{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fff;box-shadow:0 4px 16px rgba(239,68,68,.3);transform:translateY(-1px)}
.mbar-stat{font-size:11px;color:var(--text-2)}
.mbar-scroll{flex:1;overflow:auto;padding:14px 16px 16px}
.mbar-scroll::-webkit-scrollbar{width:5px}
.mbar-scroll::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:5px}

.reg-grid{display:grid;grid-template-columns:repeat(27,1fr);grid-template-rows:repeat(13,1fr);gap:3px;width:100%;height:100%;min-height:500px}
.reg-tile{border-radius:10px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2px 1px;cursor:pointer;overflow:visible;transition:filter .35s cubic-bezier(.4,0,.2,1),border-color .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1),box-shadow .35s cubic-bezier(.4,0,.2,1);transform:scale(1);position:relative}
.reg-tile:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 0 1px rgba(255,255,255,.2);filter:saturate(1.1);border-color:rgba(255,255,255,.6)!important;z-index:3!important}
.reg-tile.hovered{transform:scale(1.08)!important;transform-origin:center!important;box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 0 1px rgba(255,255,255,.2)!important;filter:saturate(1.1)!important;border-color:rgba(255,255,255,.6)!important;z-index:20!important}
.reg-tile.reg-dimmed{opacity:.22!important;filter:saturate(.2)!important;pointer-events:none}
.reg-tile.reg-selected{border-color:var(--blue-l)!important;z-index:10!important;box-shadow:0 0 0 2px var(--blue-l),0 0 18px rgba(96,165,250,.55)!important}
.reg-name{font-size:6.5px;font-weight:700;text-align:center;line-height:1.2;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
.reg-val{font-size:6px;font-family:var(--mono);font-weight:600;opacity:.75;margin-top:1px}

.map-tooltip{position:fixed;z-index:2000;pointer-events:none;opacity:0;transition:opacity .15s;
  background:var(--surface);border:1.5px solid var(--blue);border-radius:9px;padding:9px 12px;
  box-shadow:0 14px 34px rgba(0,0,0,.42);min-width:160px;max-width:220px;backdrop-filter:blur(8px)}
.map-tooltip.tt-show{opacity:1}
.map-tt-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-tt-fo{font-size:9px;font-weight:700;color:var(--blue-l);text-transform:uppercase;margin-bottom:7px;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-tt-row{display:flex;align-items:center;gap:8px}
.map-tt-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.map-tt-val{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--blue-l)}

html[data-theme="light"] .btn-home{color:#fff;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.12)}
html[data-theme="light"] .btn-home:hover{background:rgba(15,23,42,.15);border-color:rgba(15,23,42,.3)}
html[data-theme="light"] .theme-sw{background:rgba(15,23,42,.15);border-color:rgba(15,23,42,.25)}
html[data-theme="light"] .theme-sw.on{background:rgba(15,23,42,.25)}
html[data-theme="light"] .theme-knob{background:#0f172a;color:#fff}
html[data-theme="light"] .map-switcher-btn{color:rgba(15,23,42,.7);background:rgba(15,23,42,.06);border-color:rgba(15,23,42,.1)}
html[data-theme="light"] .map-switcher-btn:hover{color:#0f172a;background:rgba(15,23,42,.12);border-color:rgba(15,23,42,.2)}
html[data-theme="light"] .map-switcher-btn.active{background:rgba(37,99,235,.08);color:#1e40af}
html[data-theme="light"] .mbar-toolbar{background:var(--bg);border-top-color:var(--border)}
html[data-theme="light"] .mbar-reset{color:rgba(15,23,42,.7);background:rgba(15,23,42,.06);border-color:rgba(15,23,42,.1)}
html[data-theme="light"] .mbar-reset:hover{color:#1e40af;background:rgba(15,23,42,.12);border-color:rgba(15,23,42,.2)}
html[data-theme="light"] .mbar-stat{color:rgba(15,23,42,.7)}
html[data-theme="light"] .map-sub{color:#000!important}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="theme-sw" id="themeSw" title="Переключить тему" style="display:none">
    <div class="theme-knob">🌙</div>
  </div>
  <a href="/dashboard" class="btn-home" style="margin-left:auto" title="Вернуться в дашборд">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
</header>

<div class="content">
  <div class="map-header">
    <div class="map-title">Центр мониторинга <span>социальной поддержки</span></div>
    <div class="map-sub">
      <span class="map-dot"></span>
      Численность инвалидов · Российская Федерация · 2026
    </div>
  </div>

  <div class="map-switcher">
    <button class="map-switcher-btn active" data-map="grid">🔲 Плитка</button>
    <button class="map-switcher-btn" data-map="d3">🗺️ Карта</button>
  </div>

  <div class="map-switcher" id="d3ModeButtons" style="display:none;gap:8px;">
    <span style="flex-shrink:0;color:var(--text-3);font-size:12px;display:flex;align-items:center;">Показывать по:</span>
    <button class="map-switcher-btn active" data-mode="score">📊 Индекс риска</button>
    <button class="map-switcher-btn" data-mode="tsr">🦽 Обеспечение ТСР</button>
    <button class="map-switcher-btn" data-mode="budget">💰 Освоение бюджета</button>
    <button class="map-switcher-btn" data-mode="overdue">⏰ Просрочено</button>
  </div>

  <!-- GRID VIEW -->
  <div class="map-view active" data-map="grid">
    <aside class="mbar">
      <div class="mbar-mode">
        <div class="mbar-mode-label">Режим выбора</div>
        <div class="mbar-mode-actions">
          <button class="map-switcher-btn active" data-panel="region">Регион</button>
          <button class="map-switcher-btn" data-panel="metric">Метрика</button>
        </div>
      </div>
      <div class="mbar-head">
        <div class="mbar-title" id="mbarTitle">Субъекты РФ</div>
      </div>
      <div class="mbar-tree mbar-panel active" id="mbarTree"></div>
      <div class="mbar-panel" id="metricTree"></div>
      <div class="mbar-foot">
        <div class="mleg-row">
          <span class="mleg-lbl">меньше</span>
          <div class="mleg-bar"></div>
          <span class="mleg-lbl">больше</span>
        </div>
        <div style="margin-top:6px;font-size:11px;color:var(--text-3)"><span id="mbarTotalLabel">Общая численность</span>: <b id="mbarTotal">—</b></div>
      </div>
    </aside>
    <div class="mbar-content">
      <div class="mbar-toolbar">
        <button class="mbar-reset" id="mbarReset">✕ Сбросить</button>
        <span class="mbar-stat" id="mbarStat"></span>
      </div>
      <div class="mbar-scroll">
        <div class="reg-grid" id="regGrid" role="grid" aria-label="Региональная сетка инвалидов РФ"></div>
      </div>
    </div>
  </div>

  <!-- D3 VIEW -->
  <div class="map-view" data-map="d3">
    <div id="mapD3Container" style="width:100%;height:100%;display:flex;flex-direction:column"></div>
  </div>
</div>

<div id="mapTooltip" class="map-tooltip">
  <div id="ttName" class="map-tt-name"></div>
  <div id="ttFo" class="map-tt-fo"></div>
  <div class="map-tt-row">
    <div id="ttDot" class="map-tt-dot"></div>
    <div id="ttVal" class="map-tt-val"></div>
  </div>
</div>
</div>

<script>
const REGIONS=[
  {fo:'Центральный ФО',color:'#3b82f6',list:['Белгородская область','Брянская область','Владимирская область','Воронежская область','Ивановская область','Калужская область','Костромская область','Курская область','Липецкая область','Московская область','Орловская область','Рязанская область','Смоленская область','Тамбовская область','Тверская область','Тульская область','Ярославская область','г. Москва']},
  {fo:'Северо-Западный ФО',color:'#06b6d4',list:['Республика Карелия','Республика Коми','Архангельская область','Вологодская область','Калининградская область','Ленинградская область','Мурманская область','Новгородская область','Псковская область','г. Санкт-Петербург','Ненецкий автономный округ']},
  {fo:'Южный ФО',color:'#22c55e',list:['Республика Адыгея','Республика Калмыкия','Республика Крым','Краснодарский край','Астраханская область','Волгоградская область','Ростовская область','г. Севастополь']},
  {fo:'Северо-Кавказский ФО',color:'#f59e0b',list:['Республика Дагестан','Республика Ингушетия','Кабардино-Балкарская Республика','Карачаево-Черкесская Республика','Республика Северная Осетия — Алания','Чеченская Республика','Ставропольский край']},
  {fo:'Приволжский ФО',color:'#a855f7',list:['Республика Башкортостан','Республика Марий Эл','Республика Мордовия','Республика Татарстан','Удмуртская Республика','Чувашская Республика','Пермский край','Кировская область','Нижегородская область','Оренбургская область','Пензенская область','Самарская область','Саратовская область','Ульяновская область']},

function activeMetric(){return MAP_METRIC_GROUPS.flatMap(g=>g.items).find(m=>m.key===_mapMetric)||MAP_METRIC_GROUPS[0].items[0];}
function _hashRegionMetric(name,key){let h=0;const s=name+'|'+key;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function metricValue(name){
  const h=_hashRegionMetric(name,_mapMetric);
  if(_mapMetric.includes('budget')||_mapMetric==='tsr_cert'||_mapMetric==='employment')return 35+(h%610)/10;
  if(_mapMetric==='exam_load')return 280+(h%520);
  const base={population_total:22000,nosology:9200,exam_total:4100,exam_established:2800,exam_appeal:180,tsr_people:1700,tsr_total:7600,tsr_natural:4100}[_mapMetric]||3000;
  return Math.round(base*(0.45+(h%180)/100));
}
function metricDisplay(v){
  const unit=activeMetric().unit;
  if(unit==='%'||unit==='дел/эксп.')return (Math.round(v*10)/10).toLocaleString('ru-RU')+(unit==='%'?'%':'');
  return fmt(v);
}
function metricAggregate(list){
  const vals=list.map(n=>_mapRegionVals[n]||0);
  if(!vals.length)return 0;
  const unit=activeMetric().unit;
  const total=vals.reduce((s,v)=>s+v,0);
  return unit==='%'||unit==='дел/эксп.'?total/vals.length:total;
}

function _mapHeatRgb(t){const s=[[0,[34,197,94]],[.25,[132,204,34]],[.5,[250,191,36]],[.75,[251,146,60]],[1,[255,67,67]]];for(let i=0;i<s.length-1;i++){const[t0,[r0,g0,b0]]=s[i],[t1,[r1,g1,b1]]=s[i+1];if(t<=t1+.001){const p=(t-t0)/(t1-t0);return[~~(r0+(r1-r0)*p),~~(g0+(g1-g0)*p),~~(b0+(b1-b0)*p)];};}return s[s.length-1][1];}
function _mapTileBg(name){const v=_mapRegionVals[name]||0;const t=(v-_mapValMin)/(_mapValMax-_mapValMin||1);const[r,g,b]=_mapHeatRgb(t);const a=(0.55+t*0.4).toFixed(2);return{bg:'rgba('+r+','+g+','+b+','+a+')',bdr:'rgba('+r+','+g+','+b+','+(Math.min(1,parseFloat(a)+0.2)).toFixed(2)+')',t,r,g,b,a:parseFloat(a)};}

function rebuildMetricValues(){
  _mapRegionVals={};
  REGIONS.forEach(fo=>fo.list.forEach(n=>{_mapRegionVals[n]=metricValue(n);}));
  const vals=Object.values(_mapRegionVals);_mapValMin=Math.min(...vals);_mapValMax=Math.max(...vals);
}

function buildMapTree(filter){
  const q=(filter||'').toLowerCase().trim();const tree=qs('#mbarTree');if(!tree)return;let html='';
  REGIONS.forEach(({fo,color,list})=>{const clr=color||'#6c6c70';const visible=q?list.filter(n=>n.toLowerCase().includes(q)||regShort(n).toLowerCase().includes(q)):list;if(!visible.length)return;const foTotal=metricAggregate(visible);const isOpen=(!q&&_mbarActiveFo===fo)||!!q;html+='<div class="mfo-node'+(isOpen?' open':'')+'" data-fo="'+fo+'"><div class="mfo-hdr'+(!q&&_mbarActiveFo===fo?' mfo-active':'')+'"><span class="mfo-chev"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="mfo-dot" style="background:'+clr+'"></span><span class="mfo-name">'+fo+'</span><span class="mfo-cnt">'+visible.length+'</span><span class="mfo-tot">'+metricDisplay(foTotal)+'</span></div><div class="mfo-regs">';[...visible].sort((a,b)=>(_mapRegionVals[b]||0)-(_mapRegionVals[a]||0)).forEach(n=>{const c=_mapTileBg(n);const v=_mapRegionVals[n]||0;html+='<div class="mreg-row'+(_mbarActiveRegion===n?' mreg-active':'')+'" data-name="'+n+'" data-fo="'+fo+'"><span class="mreg-heat" style="background:'+c.bg+'"></span><span class="mreg-lbl">'+n+'</span><span class="mreg-num">'+metricDisplay(v)+'</span></div>';});html+='</div></div>';});
  tree.innerHTML=html;tree.querySelectorAll('.mfo-hdr').forEach(el=>{el.addEventListener('click',function(){const node=this.closest('.mfo-node'),fo=node.dataset.fo;const wasOpen=node.classList.contains('open');node.classList.toggle('open',!wasOpen);_mbarActiveFo=(_mbarActiveFo===fo&&wasOpen)?null:fo;_mbarActiveRegion=null;_refreshMapTiles();_updateMbarStat();});});tree.querySelectorAll('.mreg-row').forEach(el=>{el.addEventListener('click',function(e){e.stopPropagation();const name=this.dataset.name;if(_mbarActiveRegion===name){_mbarActiveRegion=null;_mbarActiveFo=null;}else{_mbarActiveRegion=name;_mbarActiveFo=this.dataset.fo;}_refreshMapTiles();if(_mbarActiveRegion){const tile=qs('.reg-tile[data-name="'+_mbarActiveRegion+'"]');if(tile)tile.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});}_updateMbarStat();});});
}

function placeMapTooltip(tt,e,preferLeft=false){
  const rect=tt.getBoundingClientRect();
  const ttW=rect.width||190,ttH=rect.height||82;
  const gap=18;
  let left=preferLeft?e.clientX-ttW-gap:e.clientX+gap;
  let top=e.clientY-ttH-gap;
  if(left+ttW>window.innerWidth-8)left=e.clientX-ttW-gap;
  if(left<8)left=e.clientX+gap;
  if(top<8)top=e.clientY+gap;
  if(top+ttH>window.innerHeight-8)top=window.innerHeight-ttH-8;
  tt.style.left=left+'px';
  tt.style.top=top+'px';
}

function _getD3Color(d){
  const p=d.properties;
  const val=p[_mapD3Mode]||0;
  const modes={
    'score':{domain:[40,60,75],range:['rgba(34,197,94,0.7)','rgba(59,130,246,0.7)','rgba(251,146,60,0.7)','rgba(239,68,68,0.85)']},
    'tsr':{domain:[72,80,87],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']},
    'budget':{domain:[60,72,82],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']},
    'overdue':{domain:[5,3,1.5],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']}
  };
  const cfg=modes[_mapD3Mode]||modes.score;
  const scale=d3.scaleThreshold().domain(cfg.domain).range(cfg.range);
  return scale(val);
}

function _d3ExtraProps(name){
  const h=_hashRegionMetric(name,'d3-extra');
  return {
    ru_name:name,
    score:35+(h%52),
    tsr:72+(h%180)/10,
    budget:58+(h%330)/10,

function renderD3ExtraRegions(g,projection){
  const orientForD3=geometry=>{
    const reverseRing=ring=>[...ring].reverse();
    if(geometry.type==='Polygon')return{type:'Polygon',coordinates:geometry.coordinates.map(reverseRing)};
    if(geometry.type==='MultiPolygon')return{type:'MultiPolygon',coordinates:geometry.coordinates.map(poly=>poly.map(reverseRing))};
    return geometry;
  };
  const features=D3_EXTRA_REGIONS.map(item=>({
    type:'Feature',
    properties:_d3ExtraProps(item.name),
    geometry:orientForD3(item.geometry)
  }));
  const path=d3.geoPath().projection(projection);
  const layer=g.append('g').attr('class','d3-extra-regions');
  layer.selectAll('path').data(features).enter().append('path')
    .attr('d',path)
    .attr('fill',d=>_getD3Color(d))
    .attr('stroke','rgba(255,255,255,.42)')
    .attr('stroke-width',1)
    .attr('stroke-linejoin','round')
    .attr('stroke-linecap','round')
    .style('cursor','pointer')
    .style('transition','all 0.2s ease')
    .on('mouseover',function(){d3.select(this).attr('stroke','rgba(255,255,255,.9)').attr('stroke-width',2).style('filter','brightness(1.25) drop-shadow(0 0 8px rgba(255,255,255,.28))');})
    .on('mousemove',(e,d)=>{const p=d.properties;const tt=qs('#mapTooltip');tt.querySelector('#ttName').textContent=p.ru_name;tt.querySelector('#ttFo').textContent=activeMetric().name;tt.querySelector('#ttVal').textContent=p[_mapD3Mode]||'—';tt.querySelector('#ttDot').style.background=_getD3Color(d);tt.classList.add('tt-show');placeMapTooltip(tt,e,true);})
    .on('mouseout',function(){d3.select(this).attr('stroke','rgba(255,255,255,.42)').attr('stroke-width',1).style('filter','none');})
    .on('mouseleave',()=>{qs('#mapTooltip').classList.remove('tt-show');})
    .on('click',(e,d)=>{const p=d.properties;let details='<strong>'+p.ru_name+'</strong><br>';details+='📊 Индекс риска: '+p.score+'<br>';details+='🦽 Обеспечение ТСР: '+p.tsr.toFixed(1)+'%<br>';details+='💰 Освоение бюджета: '+p.budget.toFixed(1)+'%<br>';details+='⏰ Просрочено: '+p.overdue.toFixed(1)+'%';showRegionPanel(p.ru_name,details);});
}

function renderMapD3(){
  console.log('renderMapD3 called, mode:',_mapD3Mode);
  const container=qs('#mapD3Container');
  if(!container){console.warn('renderMapD3: container not found');return;}
  if(!window.d3||!window.topojson){
    console.error('renderMapD3: Missing D3 or TopoJSON library');
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Ошибка: библиотеки не загружены</p></div></div>';
    return;
  }
  if(!window.RUSSIA_TOPO){
    console.warn('renderMapD3: RUSSIA_TOPO not loaded yet');
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Загрузка карты...</p></div></div>';
    setTimeout(renderMapD3,1000);
    return;
  }
  try{
    container.innerHTML='<div style="display:flex;flex-direction:column;height:100%;padding:0"><div style="flex:1;position:relative;overflow:hidden;border-radius:8px;background:var(--surface);min-height:0"><svg id="d3Map" style="width:100%;height:100%"></svg></div></div>';
    const svg=qs('#d3Map');const parentContainer=svg.parentElement.parentElement;const W=Math.max(parentContainer.clientWidth-20,600);const H=Math.max(parentContainer.clientHeight-20||500,450);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);const g=d3.select('#d3Map').append('g');const geojson=topojson.feature(window.RUSSIA_TOPO,window.RUSSIA_TOPO.objects.default);console.log('GeoJSON features:',geojson.features.length);const projection=d3.geoConicEqualArea().rotate([-105,0]).center([0,65]).parallels([50,75]).fitSize([W,H],geojson);const path=d3.geoPath().projection(projection);
    g.selectAll('path').data(geojson.features).enter().append('path').attr('d',path).attr('fill',d=>_getD3Color(d)).attr('stroke','rgba(255,255,255,.35)').attr('stroke-width',1).style('cursor','pointer').style('transition','all 0.2s ease').on('mouseover',function(e,d){d3.select(this).attr('stroke','rgba(255,255,255,.8)').attr('stroke-width',2).style('filter','brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,.3))');}).on('mousemove',(e,d)=>{const p=d.properties;const name=p.ru_name||p.name||'—';const tt=qs('#mapTooltip');tt.querySelector('#ttName').textContent=name;tt.querySelector('#ttFo').textContent=activeMetric().name;tt.querySelector('#ttVal').textContent=p[_mapD3Mode]||'—';tt.querySelector('#ttDot').style.background=_getD3Color(d);tt.classList.add('tt-show');placeMapTooltip(tt,e);}).on('mouseout',function(e,d){d3.select(this).attr('stroke','rgba(255,255,255,.08)').attr('stroke-width',0.5).style('filter','none');}).on('mouseleave',()=>{qs('#mapTooltip').classList.remove('tt-show');}).on('click',(e,d)=>{const p=d.properties;const name=p.ru_name||p.name||'—';let details='<strong>'+name+'</strong><br>';details+='📊 Индекс риска: '+(p.score||'—')+'<br>';details+='🦽 Обеспечение ТСР: '+(p.tsr?p.tsr.toFixed(1):'—')+'%<br>';details+='💰 Освоение бюджета: '+(p.budget||'—')+'%<br>';details+='⏰ Просрочено: '+(p.overdue?p.overdue.toFixed(1):'—')+'%';showRegionPanel(name,details);});renderD3ExtraRegions(g,projection);console.log('✓ D3 map rendered');
  }catch(err){
    console.error('Error rendering D3 map:',err);
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Ошибка при загрузке карты</p><p style="font-size:12px">'+err.message+'</p></div></div>';
  }
}

function showRegionPanel(name,details){
  const existing=qs('#regionPanel');
  if(existing)existing.remove();
  const panel=document.createElement('div');
  panel.id='regionPanel';
  panel.style.cssText='position:fixed;top:80px;right:20px;background:var(--surface);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:20px;min-width:320px;z-index:1000;font-family:Arial,sans-serif;color:var(--text);max-height:70vh;overflow-y:auto;border:1px solid var(--border);';

  const header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;';
  const title=document.createElement('h3');
  title.style.cssText='margin:0;font-size:18px;';
  title.textContent=name;
  const closeBtn=document.createElement('button');
  closeBtn.textContent='×';
  closeBtn.style.cssText='background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-3);padding:0;';
  closeBtn.addEventListener('click',function(){panel.remove();});
  header.appendChild(title);
  header.appendChild(closeBtn);

  const content=document.createElement('div');
  content.style.cssText='font-size:13px;color:var(--text-2);line-height:1.6;';
  content.innerHTML=details;

  panel.appendChild(header);
  panel.appendChild(content);
  document.body.appendChild(panel);
}

async function loadRussiaTopo(){
  try{
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),8000);
    const response=await fetch('../assets/js/data.js',{signal:controller.signal});
    clearTimeout(timeoutId);
    if(!response.ok){console.error('Failed to fetch data.js:',response.status);return false;}
    const txt=await response.text();
    const startIdx=txt.indexOf('const RUSSIA_TOPO = {');
    if(startIdx===-1){console.error('RUSSIA_TOPO not found in data.js');return false;}
    let braceCount=0,endIdx=-1;let inStr=false,escapeNext=false;
    for(let i=startIdx+20;i<txt.length;i++){
      const ch=txt[i];
      if(escapeNext){escapeNext=false;continue;}
      if(ch==='\\'){escapeNext=true;continue;}
      if(ch==='"'&&(i===0||txt[i-1]!=='\\')){inStr=!inStr;continue;}
      if(!inStr){if(ch==='{')braceCount++;if(ch==='}'){braceCount--;if(braceCount===0){endIdx=i;break;}}}
    }
    if(endIdx===-1){console.error('Could not find RUSSIA_TOPO end');return false;}
    const json=txt.substring(startIdx+20,endIdx+1);
    window.RUSSIA_TOPO=JSON.parse(json);
    if(!window.RUSSIA_TOPO?.objects?.default?.geometries || !Array.isArray(window.RUSSIA_TOPO.objects.default.geometries)){
      console.error('Invalid RUSSIA_TOPO structure');return false;
    }
    if(window.RUSSIA_TOPO.objects.default.geometries.length===0){
      console.error('RUSSIA_TOPO has no geometries');return false;
    }
    console.log('✓ RUSSIA_TOPO loaded successfully');
    return true;
  }catch(e){
    console.error('✗ Failed to load RUSSIA_TOPO:',e);
    return false;
  }
}

function init(){
  document.querySelectorAll('.map-switcher-btn[data-map]').forEach(btn=>btn.addEventListener('click',function(){switchMap(this.dataset.map);}));
  document.querySelectorAll('[data-panel]').forEach(btn=>btn.addEventListener('click',function(){switchPanelMode(this.dataset.panel);}));
  document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',function(){switchD3Mode(this.dataset.mode);}));
  qs('#mbarReset').addEventListener('click',function(){_mbarActiveRegion=null;_mbarActiveFo=null;buildMapTree('');_refreshMapTiles();_updateMbarStat();});
  const themeSw=document.querySelector('.theme-sw');
  if(themeSw){themeSw.addEventListener('click',function(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';applyTheme(t);});}
  _mapD3Mode='score';
  console.log('init() complete, D3 mode set to',_mapD3Mode);
  renderMetricTree();
  switchPanelMode('region');
  renderMapGrid();
  switchMap('grid');
}

const _savedTheme=localStorage.getItem('mintrud-theme');
if(_savedTheme&&_savedTheme!==document.documentElement.dataset.theme){
  applyTheme(_savedTheme);
}

document.addEventListener('DOMContentLoaded',async()=>{
  const topoLoaded=await loadRussiaTopo();
  if(!topoLoaded){console.warn('Warning: RUSSIA_TOPO failed to load, D3 map may not work');}
  init();
});
