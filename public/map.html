<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Карта РФ — Центр мониторинга социальной поддержки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<script>
if (new URLSearchParams(window.location.search).get('embedded') === '1') {
  document.documentElement.classList.add('embedded-map');
}
</script>
<style>
:root{
  --bg:#dfe8f0;--surface:#fff;--surface-2:#f0f5fb;
  --border:#c5d0e0;--border-s:#adbdd1;
  --text:#0a0f1f;--text-2:#1e3a5f;--text-3:#475569;
  --blue:#1a4fbf;--blue-l:#2563eb;--green:#0d9a5f;--red:#ef4444;
  --mono:'Roboto Mono',monospace;
}
html[data-theme="dark"]{
  --bg:#313847;--surface:#3d4555;--surface-2:#474f62;
  --border:rgba(255,255,255,.12);--border-s:rgba(255,255,255,.16);
  --text:#ffffff;--text-2:#dde5f0;--text-3:#a8b5cc;
  --blue:#93c5fd;--blue-l:#bfdbfe;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%{transform:translateY(0px)}50%{transform:translateY(-4px)}100%{transform:translateY(0px)}}
@keyframes glow{0%{text-shadow:0 0 10px rgba(96,165,250,.5)}50%{text-shadow:0 0 20px rgba(96,165,250,.8)}100%{text-shadow:0 0 10px rgba(96,165,250,.5)}}
@keyframes regionFocusPulse{0%,100%{box-shadow:0 0 0 2px #f59e0b,0 0 18px rgba(245,158,11,.55)}50%{box-shadow:0 0 0 4px #f59e0b,0 0 34px rgba(245,158,11,.85)}}
body{animation:fadeIn .3s ease-in;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;font-size:14px;min-width:1280px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
html.embedded-map body{min-width:0}
html.embedded-map .topbar{display:none}
.topbar{display:flex;align-items:center;gap:18px;padding:0 28px;height:60px;
  background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 40%,#2563eb 72%,#3b82f6 100%);
  border-bottom:1px solid rgba(255,255,255,.14);
  box-shadow:0 4px 20px rgba(20,50,180,.35), inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink:0;position:relative;z-index:1;backdrop-filter:blur(10px)}
.topbar-title{flex:1;text-align:center;font-size:16px;font-weight:800;color:#fff}
.btn-home{display:flex;align-items:center;gap:6px;text-decoration:none;
  font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);
  color:#fff;transition:all .22s cubic-bezier(.4,0,.2,1);flex-shrink:0;position:relative}
.btn-home:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);
  transform:translateX(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.2);filter:brightness(1.1)}
.theme-sw{width:44px;height:25px;border-radius:999px;background:rgba(255,255,255,.2);
  border:1.5px solid rgba(255,255,255,.3);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;margin-left:auto}
.theme-sw.on{background:rgba(255,255,255,.35)}
.theme-knob{position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  font-size:11px;display:flex;align-items:center;justify-content:center}
.theme-sw.on .theme-knob{transform:translateX(19px)}
.content{flex:1;overflow:auto;display:flex;flex-direction:column;min-height:0}
.map-header{padding:16px 28px;text-align:center;flex-shrink:0;background:var(--bg)}
.map-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;animation:float 3s ease-in-out infinite}
.map-title span{color:var(--text-2)}
.map-sub{font-size:12px;color:#fff!important;display:flex;align-items:center;justify-content:center;gap:6px}
.map-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.map-switcher{display:flex;gap:10px;padding:14px 28px;flex-shrink:0;background:var(--bg);justify-content:center}
.map-switcher.compact{padding:0 28px 12px;gap:8px;justify-content:flex-start}
.map-switcher-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:7px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative}
.map-switcher-btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff}
.map-switcher-btn.active{background:rgba(59,130,246,.25);border-color:#60a5fa;color:#60a5fa;
  box-shadow:0 0 20px rgba(96,165,250,.4), inset 0 1px 0 rgba(255,255,255,.1);backdrop-filter:blur(8px)}
.map-view-toggle{padding:12px 28px 16px;align-items:center;gap:18px}
.map-view-toggle-track{display:inline-flex;align-items:center;gap:4px;padding:4px;border:1px solid rgba(128,163,204,.22);border-radius:10px;background:rgba(10,22,42,.36);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 12px 30px rgba(2,8,23,.14);backdrop-filter:blur(12px)}
.map-view-toggle-btn{display:flex;align-items:center;gap:8px;min-width:112px;justify-content:center;border:0;border-radius:7px;padding:8px 13px;color:var(--text-3);background:transparent;box-shadow:none;font-size:12px;font-weight:850;letter-spacing:.1px}
.map-view-toggle-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.map-view-toggle-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.map-view-toggle-btn.active{background:linear-gradient(135deg,rgba(96,165,250,.25),rgba(34,197,148,.12));color:#dbeafe;border:0;box-shadow:0 8px 22px rgba(37,99,235,.18),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:none}

.map-body{display:flex;flex:1;min-height:450px;overflow:hidden;width:100%;height:100%}
.map-view{display:none;flex:1;min-height:0;gap:12px;overflow:hidden;width:100%;height:100%;flex-direction:row}
.map-view[data-map="d3"]{background:var(--bg)}
.map-view.active{display:flex!important}

.mbar{width:256px;flex-shrink:0;display:flex;flex-direction:column;height:100%;
  background:var(--bg);border-right:1px solid var(--border);overflow:hidden;backdrop-filter:blur(8px)}
.mbar-select-mode{display:flex;flex-direction:column;gap:8px;padding:10px 12px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
.mbar-select-mode .mbar-mode-label{margin:0}
.mbar-select-mode .mbar-mode-actions{display:inline-flex;gap:4px;padding:4px;border:1px solid rgba(128,163,204,.22);border-radius:10px;background:rgba(10,22,42,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.07);backdrop-filter:blur(12px)}
.mbar-select-mode .map-switcher-btn{border:0;border-radius:7px;background:transparent;box-shadow:none;padding:8px 13px;color:var(--text-3);font-size:12px;font-weight:850}
.mbar-select-mode .map-switcher-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.mbar-select-mode .map-switcher-btn.active{background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(34,197,148,.1));color:#dbeafe;box-shadow:0 8px 20px rgba(37,99,235,.14),inset 0 1px 0 rgba(255,255,255,.12);border:0}
.mbar-mode-label{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.mbar-mode-actions{display:flex;gap:7px}
.mbar-mode-actions .map-switcher-btn{flex:1;padding:7px 8px;font-size:12px}
.mbar-tree{flex:1;overflow-y:auto;padding:6px 0 12px}
.mbar-tree::-webkit-scrollbar{width:3px}
.mbar-tree::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}
.mbar-panel{display:none;flex:1;overflow-y:auto;padding:10px 10px 14px;background:var(--bg)}
.mbar-panel.active{display:block}
.metric-group{padding:8px 0 10px;border-bottom:1px solid var(--border)}
.metric-group:last-child{border-bottom:none}
.metric-group-title{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;margin:0 2px 7px}
.metric-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;
  border:1px solid transparent;background:transparent;color:var(--text-2);border-radius:8px;
  padding:8px 9px;cursor:pointer;transition:all .15s}
.metric-btn:hover{background:var(--surface-2);color:var(--text)}
.metric-btn.active{background:rgba(37,99,235,.16);border-color:rgba(96,165,250,.45);color:var(--blue-l)}
.metric-name{font-size:12px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.metric-unit{font-size:10px;font-family:var(--mono);font-weight:800;color:var(--text-3);flex-shrink:0}
.mfo-hdr{display:flex;align-items:center;padding:6px 12px 6px 8px;cursor:pointer;transition:background .12s;user-select:none}
.mfo-hdr:hover{background:var(--surface-2)}
.mfo-hdr.mfo-active{background:rgba(37,99,235,.12)}
.mfo-chev{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-3);transition:transform .2s}
.mfo-node.open>.mfo-hdr .mfo-chev{transform:rotate(90deg)}
.mfo-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-right:7px}
.mfo-name{flex:1;font-size:12px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mfo-cnt{font-size:10px;color:var(--text-3);flex-shrink:0;margin-left:4px}
.mfo-tot{font-size:10px;font-family:var(--mono);color:var(--text-2);flex-shrink:0;margin-left:5px;font-weight:600}
.mfo-regs{display:none;padding:2px 0 4px 28px}
.mfo-node.open>.mfo-regs{display:block}
.mreg-row{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 0;cursor:pointer;border-radius:6px;margin:1px 4px;transition:background .1s;position:relative}
.mreg-row:hover{background:var(--surface-2)}
.mreg-row.mreg-active{background:rgba(37,99,235,.14)}
.mreg-row.mreg-active::before{content:'';position:absolute;left:-6px;top:20%;bottom:20%;width:2px;border-radius:2px;background:var(--blue-l)}
.mreg-heat{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.mreg-lbl{flex:1;font-size:12px;color:var(--text-2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mreg-num{font-size:11px;font-family:var(--mono);color:var(--text-3);flex-shrink:0}
.mbar-foot{flex-shrink:0;padding:9px 13px;border-top:1px solid var(--border)}
.mleg-row{display:flex;align-items:center;gap:10px}
.mleg-lbl{font-size:10px;color:var(--text-3);font-weight:600}
.mleg-bar{flex:1;height:8px;border-radius:999px;background:linear-gradient(to right,#22a34a 0%,#84cc16 25%,#ca8a04 50%,#ea580c 75%,#dc2626 100%)}

.mbar-content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg)}
.mbar-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.mbar-reset{font-size:11px;font-weight:700;padding:6px 14px;border-radius:8px;border:1px solid #ef4444;
  background:transparent;color:#ef4444;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;margin-left:auto;position:relative;letter-spacing:.2px}
.mbar-reset:hover{background:#ef4444;color:#fff;box-shadow:0 4px 18px rgba(239,68,68,.4);transform:translateY(-1px)}
.mbar-stat{font-size:11px;color:var(--text-2)}
.mbar-scroll{flex:1;overflow:auto;padding:4px 8px 8px}
.mbar-scroll::-webkit-scrollbar{width:5px}
.mbar-scroll::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:5px}
.rank-panel{width:174px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;padding:10px 7px;background:var(--bg);border-left:1px solid var(--border)}
.rank-panel::-webkit-scrollbar{width:3px}
.rank-panel::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}
.rank-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);padding:0 3px 5px}
.rank-item{display:flex;align-items:center;gap:5px;padding:4px 5px;border-radius:7px;cursor:pointer;transition:background .12s;user-select:none}
.rank-item:hover{background:var(--surface-2)}
.rank-num{width:13px;font-size:9px;font-weight:800;color:var(--text-3);text-align:right;flex-shrink:0;font-family:var(--mono)}
.rank-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.rank-lbl{flex:1;font-size:10px;font-weight:700;color:var(--text-2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-val{font-size:9px;font-family:var(--mono);font-weight:600;color:var(--text-3);flex-shrink:0}
.rank-sep{height:1px;background:var(--border);margin:6px 3px}
.mleg-vals{display:flex;justify-content:space-between;margin-top:3px}
.mleg-vals span{font-size:9px;font-family:var(--mono);color:var(--text-3);font-weight:600}

.reg-grid{display:grid;grid-template-columns:repeat(22,1fr);grid-template-rows:repeat(16,1fr);gap:3px;width:100%;height:100%;min-height:500px}
.reg-tile{border-radius:10px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:20% 1px 0;cursor:pointer;overflow:visible;transition:filter .35s cubic-bezier(.4,0,.2,1),border-color .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1),box-shadow .35s cubic-bezier(.4,0,.2,1);transform:scale(1);position:relative}
.reg-tile:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 0 1px rgba(255,255,255,.2);filter:saturate(1.1);border-color:rgba(255,255,255,.6)!important;z-index:3!important}
.reg-tile.hovered{transform:scale(1.08)!important;transform-origin:center!important;box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 0 1px rgba(255,255,255,.2)!important;filter:saturate(1.1)!important;border-color:rgba(255,255,255,.6)!important;z-index:20!important}
.reg-tile.reg-dimmed{opacity:.22!important;filter:saturate(.2)!important;pointer-events:none}
.reg-tile.reg-selected{border-color:var(--blue-l)!important;z-index:10!important;box-shadow:0 0 0 2px var(--blue-l),0 0 18px rgba(96,165,250,.55)!important}
.reg-tile.reg-focus-pulse{border-color:#f59e0b!important;z-index:30!important;animation:regionFocusPulse 1.2s ease-in-out 4!important}
.reg-name{font-size:6.5px;font-weight:700;text-align:center;line-height:1.2;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}
.reg-val{font-size:6px;font-family:var(--mono);font-weight:600;opacity:.75;margin-top:1px}
.d3-region-muted{opacity:.2}
.d3-region-selected{stroke:#f59e0b!important;stroke-width:3!important;filter:brightness(1.25) drop-shadow(0 0 10px rgba(245,158,11,.55))}

.map-tooltip{position:fixed;z-index:2000;pointer-events:none;opacity:0;transition:opacity .15s;
  background:var(--surface);border:1.5px solid var(--blue);border-radius:9px;padding:9px 12px;
  box-shadow:0 14px 34px rgba(0,0,0,.42);min-width:160px;max-width:220px;backdrop-filter:blur(8px)}
.map-tooltip.tt-show{opacity:1}
.map-tt-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-tt-fo{font-size:9px;font-weight:700;color:var(--blue-l);text-transform:uppercase;margin-bottom:7px;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-tt-row{display:flex;align-items:center;gap:8px}
.map-tt-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.map-tt-val{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--blue-l)}
.selection-badge-value{font-family:var(--mono);font-size:25px;font-weight:900;color:var(--blue-l);white-space:nowrap}
html[data-theme="dark"] .metric-btn.active,
html[data-theme="dark"] .map-tt-fo,
html[data-theme="dark"] .map-tt-val,
html[data-theme="dark"] .selection-badge-value{color:#dbeafe}
html[data-theme="dark"] .map-tooltip{border-color:rgba(147,197,253,.72)}

@media (max-width:1180px){
  body{min-width:0}
  .app{height:100dvh;min-width:0}
  .topbar{height:54px;padding:0 16px}
  .topbar-title{font-size:14px;line-height:1.2}
  .map-header{padding:12px 16px}
  .map-title{font-size:18px}
  .map-switcher,.map-view-toggle{padding-inline:16px}
  .map-view-toggle{gap:12px}
  .map-view-toggle-btn{min-width:96px;padding:7px 10px;font-size:11px}
  .map-body{min-height:0}
  .mbar{width:220px}
  .mbar-select-mode{padding:9px}
  .mbar-select-mode .map-switcher-btn{padding:7px 9px;font-size:11px}
  .mbar-scroll{padding:10px}
  .reg-grid{min-height:430px;gap:2px}
  .reg-name{font-size:5.8px}
  .reg-val{font-size:5.5px}
}

@media (max-width:820px){
  .map-header{display:none}
  .map-view-toggle{padding:10px;justify-content:center}
  .map-view-toggle-track{width:100%}
  .map-view-toggle-btn{flex:1;min-width:0}
  .map-body{flex-direction:column}
  .map-view.active{flex-direction:row}
  .mbar{width:100%;height:210px;border-right:0;border-bottom:1px solid var(--border)}
  .mbar-content{width:100%;flex:1}
  .mbar-tree,.mbar-panel{padding-bottom:8px}
  .mbar-content{min-height:0}
  .mbar-toolbar{padding:9px 10px}
  .mbar-scroll{padding:10px;overflow:auto}
  .reg-grid{min-width:760px;min-height:420px}
  .map-tooltip{max-width:min(220px,calc(100vw - 24px))}
}

html[data-theme="light"] .btn-home{color:#fff;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.12)}
html[data-theme="light"] .btn-home:hover{background:rgba(15,23,42,.15);border-color:rgba(15,23,42,.3)}
html[data-theme="light"] .theme-sw{background:rgba(15,23,42,.15);border-color:rgba(15,23,42,.25)}
html[data-theme="light"] .theme-sw.on{background:rgba(15,23,42,.25)}
html[data-theme="light"] .theme-knob{background:#0f172a;color:#fff}
html[data-theme="light"] .map-switcher-btn{color:rgba(15,23,42,.7);background:rgba(15,23,42,.06);border-color:rgba(15,23,42,.1)}
html[data-theme="light"] .map-switcher-btn:hover{color:#0f172a;background:rgba(15,23,42,.12);border-color:rgba(15,23,42,.2)}
html[data-theme="light"] .map-switcher-btn.active{background:rgba(37,99,235,.08);color:#1e40af}
html[data-theme="light"] .map-view-toggle-track{background:rgba(255,255,255,.72);border-color:rgba(126,156,190,.32);box-shadow:0 10px 24px rgba(37,99,235,.08),inset 0 1px 0 rgba(255,255,255,.9)}
html[data-theme="light"] .map-view-toggle-btn{color:#64748b;background:transparent}
html[data-theme="light"] .map-view-toggle-btn:hover{color:#164da8;background:rgba(47,115,255,.08)}
html[data-theme="light"] .map-view-toggle-btn.active{color:#123d88;background:linear-gradient(135deg,rgba(47,115,255,.14),rgba(14,165,233,.08));box-shadow:0 8px 18px rgba(47,115,255,.14),inset 0 1px 0 rgba(255,255,255,.9)}
html[data-theme="light"] .mbar-select-mode .mbar-mode-actions{background:rgba(255,255,255,.66);border-color:rgba(126,156,190,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.88)}
html[data-theme="light"] .mbar-select-mode .map-switcher-btn{color:#64748b;background:transparent}
html[data-theme="light"] .mbar-select-mode .map-switcher-btn:hover{color:#164da8;background:rgba(47,115,255,.08)}

const SHORT={'Республика Северная Осетия — Алания':'С. Осетия','Кабардино-Балкарская Республика':'КБР','Карачаево-Черкесская Республика':'КЧР','Ханты-Мансийский АО — Югра':'ХМАО','Ямало-Ненецкий АО':'ЯНАО','Ненецкий автономный округ':'НАО','Республика Саха (Якутия)':'Якутия','Республика Башкортостан':'Башкортостан','Республика Татарстан':'Татарстан','Республика Дагестан':'Дагестан','Чеченская Республика':'Чечня','Республика Ингушетия':'Ингушетия','Республика Калмыкия':'Калмыкия','Республика Хакасия':'Хакасия','Республика Бурятия':'Бурятия','Республика Мордовия':'Мордовия','Республика Карелия':'Карелия','Республика Алтай':'Алтай','Республика Тыва':'Тыва','Республика Коми':'Коми','Республика Крым':'Крым','Республика Адыгея':'Адыгея','Республика Марий Эл':'Марий Эл','Удмуртская Республика':'Удмуртия','Чувашская Республика':'Чувашия'};

function regShort(n){if(SHORT[n])return SHORT[n];return n.replace(/^г\. /,'').replace(/^Республика /,'').replace(/ (область|край|АО)$/,'').replace(/ автономный округ$/,'');}

const qs=s=>document.querySelector(s);
function mapIssue(type,message,details){
  window.__MAP_DIAGNOSTICS__=window.__MAP_DIAGNOSTICS__||[];
  window.__MAP_DIAGNOSTICS__.push({type,message,details});
}
const fmt=n=>Math.round(n).toLocaleString('ru-RU');
let _mapRegionVals={},_mapValMin=0,_mapValMax=1;
let _mbarActiveFo=null,_mbarActiveRegion=null;
let _mapD3Mode='score';
let _mapPanelMode='region';
let _mapMetric='population_total';
let _topoLoadPromise=null;

const MAP_METRIC_GROUPS=[
  {title:'Общие сведения',items:[
    {key:'population_total',name:'Общая численность',unit:'чел.',d3:'score'},
    {key:'employment',name:'Занятость',unit:'%',d3:'tsr'},
    {key:'nosology',name:'Нозологический профиль',unit:'чел.',d3:'score'}
  ]},
  {title:'Освидетельствование',items:[
    {key:'exam_total',name:'Освидетельствовано',unit:'чел.',d3:'score'},
    {key:'exam_established',name:'Установлено',unit:'чел.',d3:'tsr'},
    {key:'exam_appeal',name:'Обжаловано',unit:'чел.',d3:'overdue'},
    {key:'exam_load',name:'Нагрузка',unit:'дел/эксп.',d3:'overdue'}
  ]},
  {title:'Обеспечение ТСР',items:[
    {key:'tsr_people',name:'Обеспечено инвалидов',unit:'чел.',d3:'tsr'},
    {key:'tsr_total',name:'Выдано всего ТСР',unit:'ед.',d3:'tsr'},
    {key:'tsr_natural',name:'Выдано натур',unit:'ед.',d3:'tsr'},
    {key:'tsr_cert',name:'Эл. сертификаты',unit:'%',d3:'budget'},
    {key:'budget',name:'Финансирование',unit:'%',d3:'budget'}
  ]}
];

function activeMetric(){return MAP_METRIC_GROUPS.flatMap(g=>g.items).find(m=>m.key===_mapMetric)||MAP_METRIC_GROUPS[0].items[0];}
function _hashRegionMetric(name,key){let h=0;const s=name+'|'+key;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function metricValue(name){
  const h=_hashRegionMetric(name,_mapMetric);
  if(_mapMetric.includes('budget')||_mapMetric==='tsr_cert'||_mapMetric==='employment')return 35+(h%610)/10;
  if(_mapMetric==='exam_load')return 280+(h%520);
  const base={population_total:22000,nosology:9200,exam_total:4100,exam_established:2800,exam_appeal:180,tsr_people:1700,tsr_total:7600,tsr_natural:4100}[_mapMetric]||3000;
  return Math.round(base*(0.45+(h%180)/100));
}
function metricDisplay(v){
  const unit=activeMetric().unit;
  if(unit==='%'||unit==='дел/эксп.')return (Math.round(v*10)/10).toLocaleString('ru-RU')+(unit==='%'?'%':'');
  return fmt(v);
}
function metricAggregate(list){
  const vals=list.map(n=>_mapRegionVals[n]||0);
  if(!vals.length)return 0;
  const unit=activeMetric().unit;
  const total=vals.reduce((s,v)=>s+v,0);
  return unit==='%'||unit==='дел/эксп.'?total/vals.length:total;
}

function _mapHeatRgb(t){const s=[[0,[34,197,94]],[.25,[132,204,34]],[.5,[250,191,36]],[.75,[251,146,60]],[1,[255,67,67]]];for(let i=0;i<s.length-1;i++){const[t0,[r0,g0,b0]]=s[i],[t1,[r1,g1,b1]]=s[i+1];if(t<=t1+.001){const p=(t-t0)/(t1-t0);return[~~(r0+(r1-r0)*p),~~(g0+(g1-g0)*p),~~(b0+(b1-b0)*p)];};}return s[s.length-1][1];}
function _mapTileBg(name){const v=_mapRegionVals[name]||0;const t=(v-_mapValMin)/(_mapValMax-_mapValMin||1);const[r,g,b]=_mapHeatRgb(t);const a=(0.55+t*0.4).toFixed(2);return{bg:'rgba('+r+','+g+','+b+','+a+')',bdr:'rgba('+r+','+g+','+b+','+(Math.min(1,parseFloat(a)+0.2)).toFixed(2)+')',t,r,g,b,a:parseFloat(a)};}

function rebuildMetricValues(){
  _mapRegionVals={};
  REGIONS.forEach(fo=>fo.list.forEach(n=>{_mapRegionVals[n]=metricValue(n);}));
  const vals=Object.values(_mapRegionVals);_mapValMin=Math.min(...vals);_mapValMax=Math.max(...vals);
}

function renderMetricTree(){
  const tree=qs('#metricTree');if(!tree)return;let html='';
  MAP_METRIC_GROUPS.forEach(group=>{
    html+='<div class="metric-group"><div class="metric-group-title">'+group.title+'</div>';
    group.items.forEach(item=>{
      html+='<button class="metric-btn'+(item.key===_mapMetric?' active':'')+'" data-metric="'+item.key+'"><span class="metric-name">'+item.name+'</span><span class="metric-unit">'+item.unit+'</span></button>';
    });
    html+='</div>';
  });
  tree.innerHTML=html;
  tree.querySelectorAll('[data-metric]').forEach(btn=>btn.addEventListener('click',function(){switchMetric(this.dataset.metric);}));
}

function switchPanelMode(mode){
  _mapPanelMode=mode;
  document.querySelectorAll('[data-panel]').forEach(btn=>btn.classList.toggle('active',btn.dataset.panel===mode));
  qs('#mbarTree').classList.toggle('active',mode==='region');
  qs('#metricTree').classList.toggle('active',mode==='metric');
}

function switchMetric(key){
  _mapMetric=key;
  const metric=activeMetric();
  _mapD3Mode=metric.d3||'score';
  rebuildMetricValues();
  renderMetricTree();
  renderMapGrid();
  if(qs('.map-view[data-map="d3"]').classList.contains('active'))renderMapD3();
}

function buildMapTree(filter){
  const q=(filter||'').toLowerCase().trim();const tree=qs('#mbarTree');if(!tree)return;let html='';
  REGIONS.forEach(({fo,color,list})=>{const clr=color||'#6c6c70';const visible=q?list.filter(n=>n.toLowerCase().includes(q)||regShort(n).toLowerCase().includes(q)):list;if(!visible.length)return;const foTotal=metricAggregate(visible);const isOpen=(!q&&_mbarActiveFo===fo)||!!q;html+='<div class="mfo-node'+(isOpen?' open':'')+'" data-fo="'+fo+'"><div class="mfo-hdr'+(!q&&_mbarActiveFo===fo?' mfo-active':'')+'"><span class="mfo-chev"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="mfo-dot" style="background:'+clr+'"></span><span class="mfo-name">'+fo+'</span><span class="mfo-cnt">'+visible.length+'</span><span class="mfo-tot">'+metricDisplay(foTotal)+'</span></div><div class="mfo-regs">';[...visible].sort((a,b)=>(_mapRegionVals[b]||0)-(_mapRegionVals[a]||0)).forEach(n=>{const c=_mapTileBg(n);const v=_mapRegionVals[n]||0;html+='<div class="mreg-row'+(_mbarActiveRegion===n?' mreg-active':'')+'" data-name="'+n+'" data-fo="'+fo+'"><span class="mreg-heat" style="background:'+c.bg+'"></span><span class="mreg-lbl">'+n+'</span><span class="mreg-num">'+metricDisplay(v)+'</span></div>';});html+='</div></div>';});

function regionKey(name){return String(name||'').toLowerCase().replace(/ё/g,'е').replace(/^г\. /,'').replace(/\s+/g,' ').replace(/\s+обл\.$/,' область').replace(/\s+респ\.$/,' республика').replace('республика северная осетия — алания','республика северная осетия').replace('республика северная осетия - алания','республика северная осетия').trim();}
function regionMatches(a,b){const ak=regionKey(a),bk=regionKey(b);return ak===bk||ak.includes(bk)||bk.includes(ak);}
function regionGroupForName(name){return REGIONS.find(group=>group.list.some(region=>regionMatches(region,name)));}
function regionNameForD3(name){const group=regionGroupForName(name);return group?.list.find(region=>regionMatches(region,name))||name;}
function isSelectedMapRegion(name){
  if(!name)return false;
  if(_mbarActiveRegion)return regionMatches(_mbarActiveRegion,name);
  if(_mbarActiveFo){const group=REGIONS.find(g=>g.fo===_mbarActiveFo);return !!group&&group.list.some(region=>regionMatches(region,name));}
  return false;
}
function syncD3Selection(){
  const svg=qs('#d3Map');if(!svg||!window.d3)return;
  const hasSelection=!!(_mbarActiveRegion||_mbarActiveFo);
  d3.select(svg).selectAll('path').classed('d3-region-muted',d=>hasSelection&&!isSelectedMapRegion(d?.properties?.ru_name||d?.properties?.name)).classed('d3-region-selected',d=>hasSelection&&isSelectedMapRegion(d?.properties?.ru_name||d?.properties?.name));
}
function selectRegionFromD3(name){
  const displayName=regionNameForD3(name);
  const group=regionGroupForName(name);
  if(!group)return;
  if(_mbarActiveRegion&&regionMatches(_mbarActiveRegion,displayName)){_mbarActiveRegion=null;_mbarActiveFo=null;}
  else{_mbarActiveRegion=displayName;_mbarActiveFo=group.fo;}
  buildMapTree('');
  _refreshMapTiles();
  _updateMbarStat();
}
function _syncToStore(){
  if(_mbarActiveRegion){
    localStorage.setItem('mintrud-regions',JSON.stringify([_mbarActiveRegion]));
    localStorage.setItem('mintrud-scope','reg');
  } else {
    localStorage.setItem('mintrud-regions','[]');
    localStorage.setItem('mintrud-scope','rf');

}
function _refreshMapTiles(){document.querySelectorAll('.reg-tile').forEach(tile=>{const n=tile.dataset.name,fo=tile.dataset.fo;const isSelected=_mbarActiveRegion===n;tile.classList.remove('reg-dimmed','reg-selected','hovered');tile.setAttribute('aria-selected',isSelected?'true':'false');if(_mbarActiveRegion){tile.classList.add(isSelected?'reg-selected':'reg-dimmed');}else if(_mbarActiveFo){if(fo!==_mbarActiveFo)tile.classList.add('reg-dimmed');}});syncD3Selection();}
function _restoreRegionFromStore(){
  if(_focusRegionFromQuery)return;
  const saved=JSON.parse(localStorage.getItem('mintrud-regions')||'[]');
  if(!saved.length||saved.length>1)return;
  const name=saved[0];
  const group=REGIONS.find(g=>g.list.includes(name));

}

function _updateMbarStat(){
  const el=qs('#mbarStat');
  if(!el)return;
  el.innerHTML='';
  if(_mbarActiveRegion){
    showSelectionBadge({
      title:_mbarActiveRegion,
      value:metricDisplay(_mapRegionVals[_mbarActiveRegion]||0),
      metric:activeMetric().name,
      meta:_mbarActiveFo||''

    const g=REGIONS.find(x=>x.fo===_mbarActiveFo);

      title:_mbarActiveFo,

      metric:activeMetric().name,
      meta:list.length+' субъектов'

  }

function placeMapTooltip(tt,e,preferLeft=false){
  const rect=tt.getBoundingClientRect();
  const ttW=rect.width||190,ttH=rect.height||82;
  const gap=18;
  let left=preferLeft?e.clientX-ttW-gap:e.clientX+gap;
  let top=e.clientY-ttH-gap;
  if(left+ttW>window.innerWidth-8)left=e.clientX-ttW-gap;
  if(left<8)left=e.clientX+gap;
  if(top<8)top=e.clientY+gap;
  if(top+ttH>window.innerHeight-8)top=window.innerHeight-ttH-8;
  tt.style.left=left+'px';
  tt.style.top=top+'px';
}

function _getD3Color(d){
  const p=d.properties;
  const val=p[_mapD3Mode]||0;
  const modes={
    'score':{domain:[40,60,75],range:['rgba(34,197,94,0.7)','rgba(59,130,246,0.7)','rgba(251,146,60,0.7)','rgba(239,68,68,0.85)']},
    'tsr':{domain:[72,80,87],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']},
    'budget':{domain:[60,72,82],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']},
    'overdue':{domain:[5,3,1.5],range:['rgba(239,68,68,0.85)','rgba(251,146,60,0.7)','rgba(59,130,246,0.7)','rgba(34,197,94,0.7)']}
  };
  const cfg=modes[_mapD3Mode]||modes.score;
  const scale=d3.scaleThreshold().domain(cfg.domain).range(cfg.range);
  return scale(val);
}

}

function renderD3ExtraRegions(g,projection){
  const orientForD3=geometry=>{
    const reverseRing=ring=>[...ring].reverse();
    if(geometry.type==='Polygon')return{type:'Polygon',coordinates:geometry.coordinates.map(reverseRing)};
    if(geometry.type==='MultiPolygon')return{type:'MultiPolygon',coordinates:geometry.coordinates.map(poly=>poly.map(reverseRing))};
    return geometry;
  };
  const features=D3_EXTRA_REGIONS.map(item=>({
    type:'Feature',
    properties:_d3ExtraProps(item.name),
    geometry:orientForD3(item.geometry)
  }));
  const path=d3.geoPath().projection(projection);
  const layer=g.append('g').attr('class','d3-extra-regions');
  layer.selectAll('path').data(features).enter().append('path')
    .attr('d',path)
    .attr('fill',d=>_getD3Color(d))
    .attr('stroke','rgba(255,255,255,.42)')
    .attr('stroke-width',1)
    .attr('stroke-linejoin','round')
    .attr('stroke-linecap','round')
    .style('cursor','pointer')
    .style('transition','all 0.2s ease')
    .on('mouseover',function(){d3.select(this).attr('stroke','rgba(255,255,255,.9)').attr('stroke-width',2).style('filter','brightness(1.25) drop-shadow(0 0 8px rgba(255,255,255,.28))');})
    .on('mousemove',(e,d)=>{const p=d.properties;const tt=qs('#mapTooltip');tt.querySelector('#ttName').textContent=p.ru_name;tt.querySelector('#ttFo').textContent=activeMetric().name;tt.querySelector('#ttVal').textContent=p[_mapD3Mode]||'—';tt.querySelector('#ttDot').style.background=_getD3Color(d);tt.classList.add('tt-show');placeMapTooltip(tt,e,true);})
    .on('mouseout',function(){d3.select(this).attr('stroke','rgba(255,255,255,.42)').attr('stroke-width',1).style('filter','none');})
    .on('mouseleave',()=>{qs('#mapTooltip').classList.remove('tt-show');})
    .on('click',(e,d)=>{selectRegionFromD3(d.properties.ru_name);});
}

function renderMapD3(){
  const container=qs('#mapD3Container');
  if(!container){mapIssue('warning','renderMapD3: container not found');return;}
  if(!window.d3||!window.topojson){
    mapIssue('error','renderMapD3: Missing D3 or TopoJSON library');
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Ошибка: библиотеки не загружены</p></div></div>';
    return;
  }
  if(!window.RUSSIA_TOPO){
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Загрузка карты...</p></div></div>';
    return;
  }
  try{
    container.innerHTML='<div style="display:flex;flex-direction:column;height:100%;padding:0"><div style="flex:1;position:relative;overflow:hidden;border-radius:8px;background:var(--bg);min-height:0"><svg id="d3Map" style="width:100%;height:100%"></svg></div></div>';
    const svg=qs('#d3Map');const parentContainer=svg.parentElement.parentElement;const W=Math.max(parentContainer.clientWidth-20,600);const H=Math.max(parentContainer.clientHeight-20||500,450);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);const g=d3.select('#d3Map').append('g');const geojson=topojson.feature(window.RUSSIA_TOPO,window.RUSSIA_TOPO.objects.default);const projection=d3.geoConicEqualArea().rotate([-105,0]).center([0,65]).parallels([50,75]).fitSize([W,H],geojson);const path=d3.geoPath().projection(projection);
    g.selectAll('path').data(geojson.features).enter().append('path').attr('d',path).attr('fill',d=>_getD3Color(d)).attr('stroke','rgba(255,255,255,.35)').attr('stroke-width',1).style('cursor','pointer').style('transition','all 0.2s ease').on('mouseover',function(e,d){d3.select(this).attr('stroke','rgba(255,255,255,.8)').attr('stroke-width',2).style('filter','brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,.3))');}).on('mousemove',(e,d)=>{const p=d.properties;const name=p.ru_name||p.name||'—';const tt=qs('#mapTooltip');tt.querySelector('#ttName').textContent=name;tt.querySelector('#ttFo').textContent=activeMetric().name;tt.querySelector('#ttVal').textContent=p[_mapD3Mode]||'—';tt.querySelector('#ttDot').style.background=_getD3Color(d);tt.classList.add('tt-show');placeMapTooltip(tt,e);}).on('mouseout',function(e,d){d3.select(this).attr('stroke','rgba(255,255,255,.08)').attr('stroke-width',0.5).style('filter','none');}).on('mouseleave',()=>{qs('#mapTooltip').classList.remove('tt-show');}).on('click',(e,d)=>{selectRegionFromD3(d.properties.ru_name||d.properties.name||'—');});renderD3ExtraRegions(g,projection);syncD3Selection();
  }catch(err){
    mapIssue('error','Error rendering D3 map',err.message);
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-3)"><div style="text-align:center"><p>Ошибка при загрузке карты</p><p style="font-size:12px">'+err.message+'</p></div></div>';
  }
}

async function loadRussiaTopo(){
  try{
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),8000);
    const response=await fetch('/assets/js/data.js',{signal:controller.signal});
    clearTimeout(timeoutId);
    if(!response.ok){mapIssue('error','Failed to fetch data.js',response.status);return false;}
    const txt=await response.text();
    const startIdx=txt.indexOf('const RUSSIA_TOPO = {');
    if(startIdx===-1){mapIssue('error','RUSSIA_TOPO not found in data.js');return false;}
    let braceCount=0,endIdx=-1;let inStr=false,escapeNext=false;
    for(let i=startIdx+20;i<txt.length;i++){
      const ch=txt[i];
      if(escapeNext){escapeNext=false;continue;}
      if(ch==='\\'){escapeNext=true;continue;}
      if(ch==='"'&&(i===0||txt[i-1]!=='\\')){inStr=!inStr;continue;}
      if(!inStr){if(ch==='{')braceCount++;if(ch==='}'){braceCount--;if(braceCount===0){endIdx=i;break;}}}
    }
    if(endIdx===-1){mapIssue('error','Could not find RUSSIA_TOPO end');return false;}
    const json=txt.substring(startIdx+20,endIdx+1);
    window.RUSSIA_TOPO=JSON.parse(json);
    if(!window.RUSSIA_TOPO?.objects?.default?.geometries || !Array.isArray(window.RUSSIA_TOPO.objects.default.geometries)){
      mapIssue('error','Invalid RUSSIA_TOPO structure');return false;
    }
    if(window.RUSSIA_TOPO.objects.default.geometries.length===0){
      mapIssue('error','RUSSIA_TOPO has no geometries');return false;
    }
    return true;
  }catch(e){
    mapIssue('error','Failed to load RUSSIA_TOPO',e.message);
    return false;
  }
}

function ensureRussiaTopo(){
  if(window.RUSSIA_TOPO)return Promise.resolve(true);
  if(!_topoLoadPromise)_topoLoadPromise=loadRussiaTopo();
  return _topoLoadPromise;
}

function renderRankPanel(){
  const panel=qs('#rankPanel');if(!panel)return;
  const entries=Object.entries(_mapRegionVals).filter(([n])=>REGION_GRID[n]).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){panel.innerHTML='';return;}
  const top5=entries.slice(0,5);const bot5=entries.slice(-5);
  const mkRow=([n,v],i,isTop)=>'<div class="rank-item" data-name="'+n+'"><span class="rank-num">'+(isTop?i+1:'↓')+'</span><span class="rank-dot" style="background:'+_mapTileBg(n).bg+'"></span><span class="rank-lbl">'+regShort(n)+'</span><span class="rank-val">'+metricDisplay(v)+'</span></div>';
  let html='<div class="rank-title">Топ 5 ↑</div>';
  top5.forEach((e,i)=>html+=mkRow(e,i,true));
  html+='<div class="rank-sep"></div><div class="rank-title">Аутсайдеры ↓</div>';
  bot5.forEach((e,i)=>html+=mkRow(e,i,false));
  panel.innerHTML=html;
  panel.querySelectorAll('.rank-item').forEach(el=>el.addEventListener('click',function(){const name=this.dataset.name;if(_mbarActiveRegion===name){_mbarActiveRegion=null;_mbarActiveFo=null;}else{_mbarActiveRegion=name;const g=REGIONS.find(gr=>gr.list.includes(name));_mbarActiveFo=g?g.fo:null;}buildMapTree('');_refreshMapTiles();_syncToStore();_updateMbarStat();const tile=qs('.reg-tile[data-name="'+name+'"]');if(tile)tile.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});}));
}

function updateLegendVals(){
  const mn=qs('#mlegMin'),mx=qs('#mlegMax');
  if(mn)mn.textContent=metricDisplay(_mapValMin);
  if(mx)mx.textContent=metricDisplay(_mapValMax);
}


function init(){
  document.querySelectorAll('.map-switcher-btn[data-map]').forEach(btn=>btn.addEventListener('click',function(){switchMap(this.dataset.map);}));
  document.querySelectorAll('[data-panel]').forEach(btn=>btn.addEventListener('click',function(){switchPanelMode(this.dataset.panel);}));
  qs('#mbarReset').addEventListener('click',function(){_mbarActiveRegion=null;_mbarActiveFo=null;buildMapTree('');_refreshMapTiles();_syncToStore();_updateMbarStat();});
  const themeSw=document.querySelector('.theme-sw');
  if(themeSw){themeSw.addEventListener('click',function(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';applyTheme(t);});}
  _mapD3Mode='score';
  renderMetricTree();
  switchPanelMode('region');
  renderMapGrid();
  switchMap('grid');
}

const _savedTheme=localStorage.getItem('mintrud-theme');
if(_savedTheme&&_savedTheme!==document.documentElement.dataset.theme){
  applyTheme(_savedTheme);
}
const _focusRegionFromQuery=new URLSearchParams(window.location.search).get('region');

function focusRegionFromQuery(){
  if(!_focusRegionFromQuery)return;
  const name=_focusRegionFromQuery;
  const group=REGIONS.find(g=>g.list.includes(name));
  if(!group)return;
  _mbarActiveRegion=name;
  _mbarActiveFo=group.fo;
  buildMapTree('');
  _refreshMapTiles();
  _updateMbarStat();
  const tile=qs('.reg-tile[data-name="'+name+'"]');
  if(tile){
    tile.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
    tile.classList.add('reg-focus-pulse');
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  init();
  ensureRussiaTopo().then((topoLoaded)=>{
    if(!topoLoaded){mapIssue('warning','RUSSIA_TOPO failed to load, D3 map may not work');return;}
    if(qs('.map-view[data-map="d3"]').classList.contains('active'))renderMapD3();
  });
  if(_focusRegionFromQuery){setTimeout(focusRegionFromQuery,250);}
  else{setTimeout(_restoreRegionFromStore,250);}
});
</script>
